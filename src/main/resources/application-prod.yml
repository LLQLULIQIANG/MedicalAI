# 生产环境：全部通过环境变量注入，勿把 sk- 密钥或数据库口令写进仓库
spring:
  config:
    import: optional:classpath:key-management.yml
  application:
    name: AI
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  ai:
    dashscope:
      # 密钥来源见 key-management.yml（阿里云百炼 / DashScope）
      api-key: ${app.keys.dashscope}
    chat:
      options:
        model: qwen-plus
